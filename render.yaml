services:
  # ── 后端 API 网关 ──
  - type: web
    name: recho-gateway
    env: node
    rootDir: backend/gateway
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: NVIDIA_API_KEY
        sync: false
      - key: NVIDIA_BASE_URL
        value: https://integrate.api.nvidia.com/v1
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://api.openai.com/v1
      - key: KIMI_API_KEY
        sync: false
      - key: KIMI_BASE_URL
        value: https://api.moonshot.cn/v1
      - key: TAVILY_API_KEY
        sync: false
      - key: IMAGE_GEN_API_KEY
        sync: false
      - key: IMAGE_GEN_BASE_URL
        value: https://lucen.plus/v1
      - key: IMAGE_RESPONSES_MODEL
        value: gpt-image-2
      - key: IMAGE_RESPONSES_IMAGE_MODEL
        value: gpt-image-2
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_IMAGE_BUCKET
        value: recho-images
      - key: CORS_ORIGIN
        value: https://recho-ai.onrender.com,https://recho.sansenjian.asia,http://localhost:5173,http://localhost:5174

  # ── 前端静态站点 ──
  - type: static
    name: recho-ai
    rootDir: .
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://recho-gateway.onrender.com
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /favicon.svg
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /icons.svg
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
