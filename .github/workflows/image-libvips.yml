name: Image libvips

on:
  pull_request:
    paths:
      - '.github/workflows/image-libvips.yml'
      - '.dockerignore'
      - 'Dockerfile'
      - 'backend/go-gateway/**'
  push:
    branches:
      - master
    paths:
      - '.github/workflows/image-libvips.yml'
      - '.dockerignore'
      - 'Dockerfile'
      - 'backend/go-gateway/**'

permissions:
  contents: read

concurrency:
  group: image-libvips-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  libvips:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@v3

      - name: Test Go Gateway with libvips
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: go-vips-test
          push: false
          outputs: type=cacheonly
          cache-from: type=gha,scope=image-libvips
          cache-to: type=gha,mode=max,scope=image-libvips
