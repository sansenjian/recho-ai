name: Supabase Migrations

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/supabase-migrations.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-migrations
  cancel-in-progress: false

jobs:
  push:
    name: Push database migrations
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.105.0

      - name: Verify required secrets
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN" || (echo "SUPABASE_ACCESS_TOKEN is required" && exit 1)
          test -n "$SUPABASE_DB_PASSWORD" || (echo "SUPABASE_DB_PASSWORD is required" && exit 1)
          test -n "$SUPABASE_PROJECT_REF" || (echo "SUPABASE_PROJECT_REF is required" && exit 1)

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Preview pending migrations
        run: supabase db push --dry-run --include-all

      - name: Push migrations
        run: supabase db push --include-all
